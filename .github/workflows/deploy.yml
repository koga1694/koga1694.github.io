name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# GitHub Pages 배포에 필요한 최소 권한만 부여
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 여러 배포가 실행되지 않도록 설정
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 의존성 설치 (package-lock.json 기준으로 정확히 설치)
      - name: Install dependencies
        run: npm ci

      # Eleventy로 정적 사이트 빌드 (_site/ 폴더에 생성됨)
      - name: Build site
        run: npm run build

      # 빌드 결과물을 Pages artifact로 업로드
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
